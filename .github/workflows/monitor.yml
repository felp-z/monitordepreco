name: Price Monitor
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -e .
      - name: Run price monitor
        run: python -m monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      - name: Commit price history
        run: |
          git config user.name "Price Monitor Bot"
          git config user.email "bot@monitor.local"
          git add price_history.json .cooldowns.json
          git diff --cached --quiet || git commit -m "📊 price update $(date -u +%Y-%m-%dT%H:%M)"
          git push
